<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Atividade DOM</title>
    <style>
        body {
            font-family: Arial;
            margin: 20px;
        }
        button {
            margin: 5px;
        }
        #contador {
            font-weight: bold;
            margin-left: 10px;
        }
    </style>
</head>
<body>

    <h2>Contador de Cliques</h2>
    <button id="btnMais">+</button>
    <button id="btnMenos">-</button>
    <span id="contador">0</span>

    <hr>

    <h2>Adicionar Texto</h2>
    <input type="text" id="inputTexto" placeholder="Digite algo e pressione Enter">
    <p>Caracteres (sem espaços): <span id="charCount">0</span></p>

    <div id="paragrafos"></div>

    <hr>

    <h2>Adicionar Lista</h2>
    <select id="tipoLista">
        <option value="ul">Lista não ordenada</option>
        <option value="ol">Lista ordenada</option>
    </select>
    <button id="btnLista">Adicionar Lista</button>

    <div id="listas"></div>

    <hr>

    <button id="btnReset">Resetar Tudo</button>

    <script src="script.js"></script>
</body>
</html>
